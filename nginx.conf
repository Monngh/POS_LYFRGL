# Configuración recomendada para Nginx
# Ubicación en servidor Ubuntu/Debian: /etc/nginx/sites-available/pos

server {
    listen 80;
    server_name tupos.midominio.com; # Cambia esto por la IP de tu VPS o el dominio

    # Redireccionar HTTP a HTTPS (Si se usa SSL)
    # return 301 https://$host$request_uri;

    # Directorio donde se encontrarán los archivos generados por Vite (dist)
    root /var/www/pos/frontend/dist;
    index index.html;

    # Servir el Frontend (React App)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Reverso para la API del Backend (Node.js/Express)
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Bloquear el acceso a archivos ocultos como .env o .git
    location ~ /\. {
        deny all;
    }
}
